name: AstroVerse CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Build & Test .NET 9 Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore NuGet Packages
        run: dotnet restore AstroVerse.sln

      - name: Compile Solution
        run: dotnet build AstroVerse.sln --configuration Release --no-restore

      - name: Run Backend Unit Tests
        run: dotnet test AstroVerse.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Build Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Compile Next.js Build
        run: |
          cd frontend
          npm run build
